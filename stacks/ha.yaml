services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant@sha256:ceb1202133a5a036e8b03e20a10eb113186cc2f871968323c6fc6c3fc4205716 #2026.5.4
    ports:
      - "8123:8123"
    volumes:
      - ./config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    restart: unless-stopped
    privileged: true
    network_mode: host
    environment:
      TZ: Europe/Berlin
  matterjs-server:
    container_name: matterjs-server
    image: ghcr.io/matter-js/matterjs-server@sha256:504813d276d6b09e88b169b3917bf2551c5b90cecbf3e85c4b856935b09f4ac5 #1.0.0
    ports:
      - "5580:5580"
    read_only: true
    network_mode: host
    restart: unless-stopped
    volumes:
      - "./matterjs-server:/data"